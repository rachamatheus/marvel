<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Дестинация — Marvel Tour</title>
  <link rel="stylesheet" href="styles.css?v=155">
  <link rel="icon" href="favicon.svg?v=9">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1e3a8a">
  <link rel="apple-touch-icon" href="icons/apple-touch-180.png">
  <style>
    .dest-bg { position:fixed; inset:0; z-index:-2;
      background:linear-gradient(rgba(248,251,254,0.9), rgba(248,251,254,0.94)),
        url('https://images.unsplash.com/photo-1505228395891-9a51e7e86bf6?w=2000&q=80') center center / cover no-repeat fixed; }
    body { background:transparent; }
    .dest-page { max-width:1100px; margin:96px auto 3rem; padding:0 16px; }
    .dest-back { display:inline-flex; align-items:center; gap:6px; color:var(--primary); text-decoration:none; font-weight:600; font-size:0.92rem; margin-bottom:1rem; }
    .dest-back:hover { color:var(--gold); }
    .dest-head { display:flex; align-items:center; gap:12px; margin:0 0 1.2rem; }
    .dest-head img { width:42px; height:30px; border-radius:4px; box-shadow:0 1px 4px rgba(0,0,0,.3); object-fit:cover; }
    .dest-head h1 { font-family:'Playfair Display', serif; font-size:1.9rem; color:var(--primary); margin:0; }
    .dest-frame-card { background:#fff; border-radius:18px; box-shadow:0 18px 55px rgba(8,20,50,0.18); padding:10px 14px 18px; }
    .dest-frame-card iframe { width:100%; border:0; display:block; min-height:600px; }
    @media(max-width:700px){ .dest-page{ margin:84px 8px 2rem; } .dest-head h1{ font-size:1.45rem; } }
  </style>
</head>
<body>
<div class="dest-bg"></div>

<nav class="navbar scrolled" id="navbar" style="position:fixed;">
  <a href="index.html" class="nav-logo">
    <img src="logo.svg?v=11" alt="Marvel Tour" class="nav-logo-img" style="height:64px;width:auto;object-fit:contain;" onerror="this.style.display='none';document.getElementById('nlf').style.display='flex'">
    <div id="nlf" style="display:none;align-items:center;gap:10px;">
      <div class="nav-logo-icon">✈️</div>
      <div><div class="nav-logo-text" style="color:var(--primary);">Marvel Tour</div></div>
    </div>
  </a>
  <ul class="nav-links">
    <li><a href="index.html#offers">Оферти</a></li>
    <li class="nav-dd"><button class="nav-dd-btn" onclick="event.stopPropagation();toggleNavDD('ddPochivki')">🏖️ Почивки ▾</button><div class="nav-dd-menu" id="ddPochivki"></div></li>
    <li class="nav-dd"><button class="nav-dd-btn" onclick="event.stopPropagation();toggleNavDD('ddEkskurzii')">🗺️ Екскурзии ▾</button><div class="nav-dd-menu" id="ddEkskurzii"></div></li>
    <li class="nav-dd"><button class="nav-dd-btn" onclick="event.stopPropagation();toggleNavDD('ddEkzotika')">🏝️ Екзотика ▾</button><div class="nav-dd-menu" id="ddEkzotika"></div></li>
    <li><a href="index.html#destinations">Дестинации</a></li>
    <li><a href="kruizi.html">Круизи</a></li>
    <li><a href="blog.html">Блог</a></li>
    <li><a href="index.html#why-us">За нас</a></li>
    <li><a href="index.html#reviews">Отзиви</a></li>
    <li><a href="contact.html">Контакти</a></li>
  </ul>
</nav>

<div class="dest-page">
  <a href="javascript:history.back()" class="dest-back">← Назад</a>
  <div class="dest-head">
    <img id="destFlag" src="" alt="" style="display:none;">
    <h1 id="destName">Дестинация</h1>
  </div>
  <div class="dest-frame-card" id="destFrameCard"></div>
</div>

<script>
(function () {
  var q = new URLSearchParams(location.search);
  var name = q.get('d') || 'Дестинация';
  var ifr = q.get('f') || '';
  var cc = q.get('cc') || '';
  document.getElementById('destName').textContent = name;
  document.title = name + ' — Marvel Tour';
  if (cc) {
    var fl = document.getElementById('destFlag');
    fl.src = 'https://flagcdn.com/w80/' + cc + '.png';
    fl.style.display = 'block';
  }
  if (ifr) {
    document.getElementById('destFrameCard').innerHTML =
      '<iframe id="pvFrame" width="100%" src="https://iframe.peakview.bg/?cl=999&ifr_id=' + encodeURIComponent(ifr) +
      '" scrolling="no" frameborder="0" onload="window.scroll(0,0);"></iframe>';
    var s = document.createElement('script');
    s.src = 'https://iframe.peakview.bg/js/iframeResizer.min.js';
    s.onload = function () { try { iFrameResize({ checkOrigin: false, heightCalculationMethod: 'max' }, '#pvFrame'); } catch (e) {} };
    document.body.appendChild(s);
  }
})();
</script>
<script src="navdd.js?v=1"></script>
</body>
</html>
