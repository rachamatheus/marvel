<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Оферта — Marvel Tour</title>
  <meta name="description" content="Marvel Tour — детайли за оферта, програма, хотели и цени.">
  <link rel="stylesheet" href="styles.css?v=155">
  <link rel="icon" href="favicon.svg?v=9">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1e3a8a">
  <link rel="apple-touch-icon" href="icons/apple-touch-180.png">
  <style>
    /* Per-offer themed backdrop (set from the offer's own photo) */
    .oferta-bg { position:fixed; inset:0; z-index:-2; background-size:cover; background-position:center; background-repeat:no-repeat; }
    .oferta-bg::after { content:''; position:absolute; inset:0; background:linear-gradient(rgba(228,235,246,0.8), rgba(228,235,246,0.88)); }
    body { background:transparent; }
    .offer-page { max-width: 1000px; margin: 88px auto 4rem; padding: 1.6rem 2.2rem 3rem; background:#fff; border-radius:22px; box-shadow:0 18px 55px rgba(8,20,50,0.22); }
    .offer-details { color:#262b35; }
    .offer-back { display:inline-flex; align-items:center; gap:6px; color:var(--primary); text-decoration:none; font-weight:600; font-size:0.9rem; margin-bottom:1rem; }
    .offer-back:hover { color: var(--gold); }
    .offer-hero-img { width:100%; height:420px; object-fit:cover; border-radius:20px; display:block; }
    @media(max-width:700px){ .offer-hero-img{ height:260px; } .offer-page{ margin:78px 8px 2rem; padding:1.1rem 1.1rem 2rem; border-radius:16px; } }
    .offer-cols { display:grid; grid-template-columns: 1fr; gap:1.5rem; margin-top:1.5rem; }
    .offer-section-title { font-size:1.05rem; font-weight:700; color:var(--primary); margin:1.6rem 0 0.8rem; }
    .offer-details { color:#000; line-height:1.75; font-size:0.97rem; }
    .offer-details li, .offer-details p, .offer-details td { color:#000; }
    .offer-details h3, .offer-details h4 { color:var(--primary); font-size:1rem; font-weight:700; margin:1.2rem 0 0.5rem; }
    .offer-details p { margin:0 0 0.7rem; }
    .offer-details ul, .offer-details ol { margin:0 0 0.8rem 1.2rem; padding:0; }
    .offer-details li { margin:0.2rem 0; }
    .offer-details table { width:100%; border-collapse:collapse; margin:0.8rem 0; font-size:0.88rem; border:2px solid #111; }
    .offer-details th, .offer-details td { border:1px solid #111; padding:0.45rem 0.6rem; text-align:left; vertical-align:top; }
    .offer-details th { background:rgba(26,58,107,0.06); color:var(--primary); font-weight:700; }
    .offer-details tr:nth-child(even) td { background:rgba(0,0,0,0.02); }
    .offer-details strong { color:var(--primary); }
    .offer-details .od-table-wrap { overflow-x:auto; }
    .offer-details table tr:hover td { background: rgba(201,168,76,0.14); }
    .offer-details tr.od-row-selected td { background:#dcfce7 !important; color:#08351c !important; font-weight:700; border-color:#16a34a !important; }
    .offer-details tr.od-row-selected td:first-child { box-shadow: inset 5px 0 0 #16a34a; }
    .offer-details tr.od-row-selected td:first-child::before { content:'✔ '; color:#16a34a; font-weight:800; }
    /* Structured, client-friendly hotel description */
    .hotel-desc .hd-sec { border-left:3px solid var(--gold,#C9A84C); padding:2px 0 2px 12px; margin:12px 0; }
    .hotel-desc .hd-sec-title { font-weight:800; color:var(--primary); font-size:1rem; margin-bottom:4px; }
    .hotel-desc .hd-body { color:#1f2430; font-size:0.94rem; line-height:1.65; }
    .hotel-desc .hd-body p { margin:0 0 5px; }
    .hotel-desc .hd-body strong { color:var(--primary); }
    /* Hotel price table (room type -> price, date dropdown) */
    .hotel-prices { margin-top:16px; border-top:1px solid var(--gray-200,#e5e7eb); padding-top:14px; }
    .hotel-prices .hp-head { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:10px; font-weight:800; color:var(--primary); }
    .hotel-prices .hp-head select { font-family:inherit; padding:6px 10px; border:1.5px solid var(--gray-300,#d1d5db); border-radius:8px; font-size:0.9rem; cursor:pointer; }
    .hotel-prices .hp-head label { font-weight:600; color:var(--gray-700,#374151); font-size:0.9rem; }
    .hp-table { width:100%; border-collapse:collapse; font-size:0.9rem; }
    .hp-table th { background:rgba(26,58,107,0.06); color:var(--primary); text-align:left; padding:8px 10px; border:1px solid var(--gray-200,#e5e7eb); }
    .hp-table td { padding:8px 10px; border:1px solid var(--gray-200,#e5e7eb); color:#1f2430; }
    .hp-table tr:nth-child(even) td { background:rgba(0,0,0,0.02); }
    /* Offer content tabs (like the operator: Хотели · Програма · Цената включва · …) */
    .offer-tabs { display:flex; flex-wrap:wrap; gap:8px; margin:1.6rem 0 1rem; border-bottom:2px solid var(--gray-200,#e5e7eb); padding-bottom:2px; }
    .offer-tab-btn { font-family:inherit; font-size:0.92rem; font-weight:700; color:var(--gray-600,#4b5563); background:transparent; border:none; border-bottom:3px solid transparent; padding:10px 14px; cursor:pointer; border-radius:8px 8px 0 0; transition:all .15s; white-space:nowrap; }
    .offer-tab-btn:hover { color:var(--primary); background:rgba(26,58,107,0.05); }
    .offer-tab-btn.active { color:var(--primary); border-bottom-color:var(--gold,#C9A84C); }
    .offer-tab-panels .otp { margin-top:0.4rem; }
  </style>
</head>
<body>
<div class="oferta-bg" id="ofertaBg"></div>

<nav class="navbar scrolled" id="navbar" style="position:fixed;">
  <a href="index.html" class="nav-logo">
    <img src="logo.svg?v=11" alt="Marvel Tour" class="nav-logo-img" style="height:64px;width:auto;object-fit:contain;" onerror="this.style.display='none';document.getElementById('nlf').style.display='flex'">
    <div id="nlf" style="display:none;align-items:center;gap:10px;">
      <div class="nav-logo-icon">✈️</div>
      <div><div class="nav-logo-text" style="color:var(--primary);">Marvel Tour</div></div>

<div id="offerRoot">
<div class="offer-page" id="offerPage">
  <a href="index.html#offers" class="offer-back">← Всички оферти</a>

  <!-- Gallery -->
  <div class="modal-gallery-wrap">
    <img class="offer-hero-img" id="offerImg" src="" alt="">
    <button class="gallery-nav prev" id="galleryPrev" onclick="galleryStep(-1)" aria-label="Предишна">‹</button>
    <button class="gallery-nav next" id="galleryNext" onclick="galleryStep(1)" aria-label="Следваща">›</button>
    <div class="gallery-counter" id="galleryCounter"></div>
  </div>
  <div class="modal-thumbs" id="offerThumbs"></div>

  <div class="modal-badge-row" id="offerBadges" style="margin-top:1.2rem;"></div>
  <h1 class="modal-title" id="offerTitle" style="font-size:1.8rem;"></h1>
  <div class="modal-price-row">
    <div class="modal-price" id="offerPrice"></div>
    <div class="modal-price-sub" id="offerPriceSub"></div>
  </div>
  <p class="modal-desc" id="offerDesc"></p>

  <!-- Tabbed offer content (Хотели · Програма · Цената включва · Цената не включва · Други) -->
  <div id="offerTabs" class="offer-tabs"></div>
  <div class="offer-tab-panels">
    <div class="otp" id="panelHotels" style="display:none;">
      <div class="offer-section-title" style="margin-top:0;">🏨 Изберете хотел <span style="font-weight:400;color:var(--gray-400);font-size:0.82rem;">(кликнете 🔍 за снимки)</span></div>
      <div id="offerHotels"></div>
      <div id="hotelDetail" style="display:none;margin-top:1rem;background:#fff;border:1px solid var(--gray-200,#e5e7eb);border-radius:14px;padding:1.3rem 1.4rem;"></div>
    </div>
    <div class="otp offer-details" id="panelProgram" style="display:none;"></div>
    <div class="otp offer-details" id="panelIncludes" style="display:none;"></div>
    <div class="otp offer-details" id="panelExcludes" style="display:none;"></div>
    <div class="otp offer-details" id="panelOther" style="display:none;"></div>
  </div>

  <!-- Dates -->
  <div class="offer-section-title">📅 Налични дати</div>
  <div class="modal-dates-grid" id="offerDates"></div>

  <!-- Inquiry -->
  <div class="inquiry-form" id="inquirySection" style="margin-top:2rem;">
    <h3>📬 Изпратете запитване</h3>
    <div id="inquiryFormContent">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Вашето име *</label>
          <input type="text" class="form-input" id="inqName" placeholder="Иван Иванов">
        </div>
        <div class="form-group">
          <label class="form-label">Телефон *</label>
          <input type="tel" class="form-input" id="inqPhone" placeholder="+359 88 888 8888">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="inqEmail" placeholder="ivan@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Реф. номер на оферта</label>
          <input type="text" class="form-input" id="inqRef" readonly style="background:var(--gray-100);font-weight:600;">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Възрастни *</label>
          <select class="form-select" id="inqAdults">
            <option value="1" selected>1 възрастен</option>
            <option value="2">2 възрастни</option>
            <option value="3">3 възрастни</option>
            <option value="4">4 възрастни</option>
            <option value="5">5 възрастни</option>
            <option value="6">6+ възрастни</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Деца</label>
          <select class="form-select" id="inqChildren">
            <option value="0" selected>Без деца</option>
            <option value="1">1 дете</option>
            <option value="2">2 деца</option>
            <option value="3">3 деца</option>
            <option value="4">4 деца</option>
          </select>
        </div>
      </div>
      <div class="form-group" id="inqHotelGroup" style="margin-bottom:12px;display:none;">
        <label class="form-label">Избран хотел</label>
        <input type="text" class="form-input" id="inqHotel" readonly placeholder="Изберете хотел от списъка">
      </div>
      <div class="form-group" style="margin-bottom:12px;">
        <label class="form-label">Предпочитана дата</label>
        <select class="form-select" id="inqDate"></select>
      </div>
      <div class="form-group" style="margin-bottom:12px;">
        <label class="form-label">Съобщение (по желание)</label>
        <textarea class="form-textarea" id="inqMsg" placeholder="Специални изисквания, въпроси..."></textarea>
      </div>
      <button class="form-submit" onclick="submitInquiry()">✉️ Изпрати запитване</button>
    </div>
    <div class="form-success" id="inquirySuccess" style="display:none;">
      <div class="form-success-icon">🎉</div>
      <h4>Запитването е изпратено!</h4>
      <p style="color:var(--gray-600);margin-top:6px;">Ще се свържем с вас възможно най-скоро.</p>
    </div>
  </div>
</div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()" aria-label="Затвори">✕</button>
  <button class="lightbox-nav prev" onclick="lightboxStep(-1)" aria-label="Предишна">‹</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="">
  <button class="lightbox-nav next" onclick="lightboxStep(1)" aria-label="Следваща">›</button>
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<div class="toast-container" id="toastContainer"></div>
