<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оферти на живо — Marvel Tour</title>
  <meta name="description" content="Актуални оферти за почивки, екскурзии и круизи — Marvel Tour.">
  <link rel="stylesheet" href="styles.css?v=154">
  <link rel="icon" href="favicon.svg?v=9">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1e3a8a">
  <style>
    .cat-bg { position:fixed; inset:0; z-index:-2; background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=2000&q=80') center/cover no-repeat fixed; }
    .cat-bg::after { content:''; position:absolute; inset:0; background:linear-gradient(rgba(248,251,254,0.9),rgba(248,251,254,0.95)); }
    body { background:transparent; }
    .cat-wrap { max-width:1280px; margin:96px auto 4rem; padding:0 1rem; }
    .cat-head { text-align:center; margin-bottom:1.4rem; }
    .cat-head h1 { font-family:'Playfair Display',serif; color:var(--primary); font-size:clamp(1.8rem,4vw,2.6rem); margin:.4rem 0; }
    .cat-toolbar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:center; margin-bottom:1.4rem; }
    .cat-toolbar input, .cat-toolbar select { padding:11px 14px; border:1px solid #d8dee9; border-radius:12px; font:inherit; font-size:.92rem; background:#fff; }
    .cat-toolbar input { min-width:240px; }
    .cat-chips { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:1.6rem; }
    .cat-chip { border:1px solid #d8dee9; background:#fff; color:#374151; padding:8px 16px; border-radius:999px; font-size:.88rem; font-weight:600; cursor:pointer; transition:all .14s; }
    .cat-chip.active, .cat-chip:hover { background:var(--primary); color:#fff; border-color:var(--primary); }
    .cat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:1.2rem; }
    .cat-card { background:#fff; border:1px solid #e8edf3; border-radius:16px; overflow:hidden; box-shadow:0 10px 30px rgba(8,20,50,.08); display:flex; flex-direction:column; transition:transform .15s, box-shadow .15s; }
    .cat-card:hover { transform:translateY(-3px); box-shadow:0 18px 44px rgba(8,20,50,.16); }
    .cat-card-img { height:180px; background:#eef2f8 center/cover no-repeat; position:relative; }
    .cat-badge2 { position:absolute; top:10px; left:10px; background:rgba(30,58,138,.92); color:#fff; font-size:.72rem; font-weight:700; padding:4px 10px; border-radius:999px; }
    .cat-company { position:absolute; bottom:10px; right:10px; background:rgba(255,255,255,.92); color:var(--primary); font-size:.68rem; font-weight:700; padding:3px 9px; border-radius:999px; }
    .cat-card-body { padding:14px 16px; display:flex; flex-direction:column; gap:8px; flex:1; }
    .cat-card-body h3 { margin:0; font-size:1rem; line-height:1.3; color:#1f2937; }
    .cat-meta { font-size:.82rem; color:#6b7280; }
    .cat-price { margin-top:auto; font-weight:800; color:var(--primary); font-size:1.15rem; }
    .cat-price span { font-size:.8rem; color:#9ca3af; font-weight:600; }
    .cat-btn { display:block; text-align:center; margin-top:8px; background:var(--primary); color:#fff; text-decoration:none; padding:10px; border-radius:10px; font-weight:600; font-size:.9rem; }
    .cat-btn:hover { background:#16307a; }
    .cat-empty { text-align:center; color:#6b7280; padding:3rem 1rem; grid-column:1/-1; }
    /* Модал за разглеждане на оферта */
    .off-modal { position:fixed; inset:0; z-index:10000; background:rgba(8,16,35,.6); display:none; align-items:center; justify-content:center; padding:18px; }
    .off-modal.open { display:flex; }
    .off-box { background:#fff; border-radius:16px; width:100%; max-width:1000px; height:90vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 30px 80px rgba(8,20,50,.5); }
    .off-bar { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid #eef0f4; }
    .off-bar h3 { margin:0; font-size:1rem; color:var(--primary); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .off-bar a { font-size:.82rem; color:var(--primary); text-decoration:none; font-weight:600; white-space:nowrap; }
    .off-bar button { background:none; border:none; font-size:26px; line-height:1; cursor:pointer; color:#6b7280; }
    .off-frame { flex:1; width:100%; border:0; }
  </style>
</head>
<body>
<div class="cat-bg"></div>

<nav class="navbar scrolled" id="navbar" style="position:fixed;">
  <a href="index.html" class="nav-logo">
    <img src="logo.svg?v=11" alt="Marvel Tour" class="nav-logo-img" style="height:64px;width:auto;object-fit:contain;">
  </a>
  <button class="nav-hamburger" id="navHamburger" onclick="document.getElementById('mobileMenu').classList.toggle('open')">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links">
    <li><a href="index.html#offers">Оферти</a></li>
    <li><a href="oferti.html">Оферти на живо</a></li>
    <li><a href="index.html#destinations">Дестинации</a></li>
    <li><a href="kruizi.html">Круизи</a></li>
    <li><a href="blog.html">Блог</a></li>
    <li><a href="contact.html">Контакти</a></li>
  </ul>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html#offers">✈️ Оферти</a>
  <a href="oferti.html">🔥 Оферти на живо</a>
  <a href="index.html#destinations">🗺️ Дестинации</a>
  <a href="kruizi.html">🚢 Круизи</a>
  <a href="blog.html">📖 Блог</a>
  <a href="contact.html">📧 Контакти</a>
</div>

<section class="section" style="padding-top:104px;">
  <div style="max-width:1720px;margin:0 auto;">
    <div class="section-header">
      <div class="section-badge">🔥 Оферти на живо</div>
      <h2 class="section-title">Актуални оферти</h2>
    </div>

    <div class="filters-bar">
      <div class="filter-group" id="catFilters">
        <button class="filter-btn active" data-filter="all" onclick="setCat('all',this)">Всички</button>
        <button class="filter-btn" data-filter="exotic" onclick="setCat('exotic',this)">🌴 Екзотика</button>
        <button class="filter-btn" data-filter="vacation" onclick="setCat('vacation',this)">🏖️ Почивки</button>
        <button class="filter-btn" data-filter="excursion" onclick="setCat('excursion',this)">🗺️ Екскурзии</button>
        <button class="filter-btn" data-filter="cruise" onclick="setCat('cruise',this)">🚢 Круизи</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-search">
        <svg width="16" height="16" fill="none" stroke="#9ca3af" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="catSearch" placeholder="Търсете оферта, дестинация..." autocomplete="off" oninput="catRender()">
      </div>
    </div>

    <div id="catCount" style="margin:0.6rem 0 1rem;font-size:0.92rem;color:var(--gray-600);font-weight:600;"></div>
    <div class="offers-grid" id="catGrid"></div>
  </div>
</section>


<script src="data/peakview.js?v=3"></script>
<script>
  var PUSH_ENDPOINT = 'https://marveltour-push.marveltour.workers.dev';
  var ALL = window.PEAKVIEW_OFFERS || [];
  var PUB = { ids: [], prices: {} };
  var state = { cat: 'all', q: '', company: '' };

  var CATS = [
    { k:'all', label:'Всички' },
    { k:'vacation', label:'🏖️ Почивки' },
    { k:'excursion', label:'🗺️ Екскурзии' },
    { k:'exotic', label:'🏝️ Екзотика' },
    { k:'cruise', label:'🚢 Круизи' }
  ];

  function published() {
    var set = new Set(PUB.ids);
    return ALL.filter(function(o){ return set.has(o.id); });
  }

  function init() {
    catRender();
  }

  function setCat(k, btn) {
    state.cat = k;
    document.querySelectorAll('#catFilters .filter-btn').forEach(function(x){ x.classList.remove('active'); });
    if (btn) btn.classList.add('active');
    catRender();
  }

  function catRender() {
    state.q = (document.getElementById('catSearch').value||'').toLowerCase().trim();
    var _cc = document.getElementById('catCompany'); state.company = _cc ? _cc.value : '';
    var list = published().filter(function(o){
      if (state.cat!=='all' && o.cat!==state.cat) return false;
      if (state.company && o.company!==state.company) return false;
      if (state.q && (o.title+' '+o.dest).toLowerCase().indexOf(state.q)===-1) return false;
      return true;
    });
    var cc = document.getElementById('catCount');
    if (cc) cc.textContent = list.length ? ('Намерени ' + list.length + ' оферти') : '';
    var grid = document.getElementById('catGrid');
    if (!list.length) { grid.innerHTML = '<div class="no-results" style="display:block;"><div class="no-results-icon">🔍</div><h3>Няма намерени оферти</h3><p>Опитайте с различни филтри.</p></div>'; return; }
    grid.innerHTML = list.map(function(o){
      var price = (PUB.prices && PUB.prices[o.id]) ? PUB.prices[o.id] : o.bgn;
      var typeCls = o.cat==='vacation'?'vacation':o.cat==='excursion'?'excursion':'';
      return '<a class="offer-card" href="oferta-jivo.html?id='+encodeURIComponent(o.id)+'" target="_blank" rel="noopener">' +
        '<div class="offer-card-img-wrap">' +
          '<img class="offer-card-img" src="'+o.cover+'" alt="'+o.title+'" loading="lazy" onerror="this.style.opacity=0">' +
          '<span class="offer-badge '+typeCls+'">'+o.catlbl+'</span>' +
        '</div>' +
        '<div class="offer-card-body">' +
          (o.dest?('<div class="offer-destination">📍 '+o.dest+'</div>'):'') +
          '<div class="offer-title">'+o.title+'</div>' +
          '<div class="offer-meta">' +
            (o.nights?('<div class="offer-meta-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> '+o.days+' дни / '+o.nights+' нощ.</div>'):'') +
            (o.dates?('<div class="offer-meta-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> '+o.dates+'</div>'):'') +
          '</div>' +
          '<div class="offer-card-footer">' +
            '<div><div class="offer-price-label">Цена от</div><div>' +
              (price?('<span class="offer-price">'+price+' лв.</span>'):'') +
              (o.eur?('<span class="offer-price-eur"> / '+o.eur+' €</span>'):'') +
            '</div></div>' +
            '<span class="offer-btn">Детайли →</span>' +
          '</div>' +
        '</div></a>';
    }).join('');
  }

  function openOffer(id) {
    var o = ALL.filter(function(x){return x.id===id;})[0];
    if (!o) return;
    document.getElementById('offTitle').textContent = o.title;
    document.getElementById('offNewTab').href = o.detail;
    document.getElementById('offFrame').src = o.detail;
    document.getElementById('offModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeOffer() {
    document.getElementById('offModal').classList.remove('open');
    document.getElementById('offFrame').src = 'about:blank';
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeOffer(); });

  // зареди публикуваните и стартирай
  fetch(PUSH_ENDPOINT + '/catalog').then(function(r){return r.json();})
    .then(function(d){ PUB = d || PUB; }).catch(function(){})
    .finally(init);
</script>
<script src="lang.js?v=136"></script>
<script src="pwa.js?v=7"></script>
</body>
</html>
