<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Оферта на живо — Marvel Tour</title>
  <link rel="stylesheet" href="styles.css?v=154">
  <link rel="icon" href="favicon.svg?v=9">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1e3a8a">
  <link rel="apple-touch-icon" href="icons/apple-touch-180.png">
  <style>
    .oferta-bg { position:fixed; inset:0; z-index:-2; background-size:cover; background-position:center; background-repeat:no-repeat; }
    .oferta-bg::after { content:''; position:absolute; inset:0; background:linear-gradient(rgba(228,235,246,0.8), rgba(228,235,246,0.88)); }
    body { background:transparent; }
    .offer-page { max-width:1000px; margin:88px auto 4rem; padding:1.6rem 2.2rem 3rem; background:#fff; border-radius:22px; box-shadow:0 18px 55px rgba(8,20,50,0.22); }
    .offer-back { display:inline-flex; align-items:center; gap:6px; color:var(--primary); text-decoration:none; font-weight:600; font-size:0.9rem; margin-bottom:1rem; }
    .offer-back:hover { color:var(--gold); }
    .offer-hero-img { width:100%; height:420px; object-fit:cover; border-radius:20px; display:block; }
    @media(max-width:700px){ .offer-hero-img{ height:240px; } .offer-page{ margin:78px 8px 2rem; padding:1.1rem 1.1rem 2rem; border-radius:16px; } }
    .offer-section-title { font-size:1.05rem; font-weight:700; color:var(--primary); margin:1.6rem 0 0.8rem; }
    .offer-details { color:#000; line-height:1.75; font-size:0.97rem; }
    .offer-details h2, .offer-details h3, .offer-details h4 { color:var(--primary); font-size:1.05rem; font-weight:700; margin:1.2rem 0 0.5rem; }
    .offer-details p { margin:0 0 0.7rem; }
    .offer-details ul, .offer-details ol { margin:0 0 0.8rem 1.2rem; }
    .offer-details li { margin:0.2rem 0; }
    .offer-details img { max-width:280px; height:auto; border-radius:12px; margin:6px 12px 6px 0; }
    .offer-details font { font-weight:700; color:var(--primary); }
    .offer-tabs { display:flex; flex-wrap:wrap; gap:8px; margin:1.6rem 0 1rem; border-bottom:2px solid var(--gray-200,#e5e7eb); padding-bottom:2px; }
    .offer-tab-btn { font-family:inherit; font-size:0.92rem; font-weight:700; color:var(--gray-600,#4b5563); background:transparent; border:none; border-bottom:3px solid transparent; padding:10px 14px; cursor:pointer; border-radius:8px 8px 0 0; transition:all .15s; white-space:nowrap; }
    .offer-tab-btn:hover { color:var(--primary); background:rgba(26,58,107,0.05); }
    .offer-tab-btn.active { color:var(--primary); border-bottom-color:var(--gold,#C9A84C); }
    /* хотелски карти в таб „Хотели" */
    .pv-hotels { display:flex; flex-direction:column; gap:12px; }
    .pv-hotel { border:1px solid var(--gray-200,#e5e7eb); border-radius:14px; overflow:hidden; background:#fff; }
    .pv-hotel.open { box-shadow:0 10px 30px rgba(8,20,50,.12); }
    .pv-hotel-head { display:flex; align-items:center; gap:14px; padding:10px 14px; cursor:pointer; }
    .pv-hotel-head:hover { background:rgba(26,58,107,0.04); }
    .pv-hotel-head img { width:90px; height:66px; object-fit:cover; border-radius:10px; flex:0 0 auto; }
    .pv-hotel-info { flex:1; min-width:0; }
    .pv-hotel-name { font-weight:700; color:var(--primary); font-size:1rem; }
    .pv-hotel-loc { font-size:0.84rem; color:var(--gray-500,#6b7280); }
    .pv-hotel-price { font-weight:800; color:#9a7b1f; font-size:0.95rem; margin-top:2px; }
    .pv-hotel-toggle { flex:0 0 auto; font-size:0.84rem; font-weight:700; color:var(--primary); }
    .pv-hotel-body { padding:0 14px 16px; border-top:1px solid var(--gray-100,#f3f4f6); }
    .pv-hgal { display:flex; gap:8px; overflow-x:auto; padding:12px 0; }
    .pv-hgal img { width:120px; height:84px; object-fit:cover; border-radius:8px; cursor:pointer; flex:0 0 auto; }
    .pv-hdesc { font-size:0.9rem; color:#374151; line-height:1.6; margin:0 0 12px; }
    .pv-hp-head { display:flex; align-items:center; gap:10px; margin:8px 0; font-weight:700; color:var(--primary); }
    .pv-hp-head select { font-family:inherit; padding:6px 10px; border:1.5px solid var(--gray-300,#d1d5db); border-radius:8px; font-size:0.9rem; cursor:pointer; }
    .pv-price-table { width:100%; border-collapse:collapse; font-size:0.9rem; }
    .pv-price-table th { background:rgba(26,58,107,0.06); color:var(--primary); text-align:left; padding:8px 10px; border:1px solid var(--gray-200,#e5e7eb); }
    .pv-price-table td { padding:8px 10px; border:1px solid var(--gray-200,#e5e7eb); color:#1f2430; }
    .pv-price-table tr:nth-child(even) td { background:rgba(0,0,0,0.02); }
    .pv-room-title { font-weight:800; color:var(--primary); margin:14px 0 6px; font-size:0.98rem; }
    .pv-price-cell { cursor:pointer; color:var(--primary); font-weight:600; white-space:nowrap; }
    .pv-price-row:hover td { background:rgba(201,168,76,0.12); }
    .pv-price-cell:hover { background:rgba(201,168,76,0.22); }
    .pv-price-row.selected td { background:#dcfce7 !important; color:#08351c; font-weight:700; }
    .pv-price-cell.selected { background:#bbf7d0 !important; color:#08351c; font-weight:800; }
  </style>
</head>
<body>
<div class="oferta-bg" id="ofertaBg"></div>

<nav class="navbar scrolled" id="navbar" style="position:fixed;">
  <a href="index.html" class="nav-logo">
    <img src="logo.svg?v=11" alt="Marvel Tour" class="nav-logo-img" style="height:64px;width:auto;object-fit:contain;">
  </a>
  <button class="nav-hamburger" id="navHamburger" onclick="document.getElementById('mobileMenu').classList.toggle('open')"><span></span><span></span><span></span></button>
  <ul class="nav-links">
    <li><a href="index.html#offers">Оферти</a></li>
    <li><a href="oferti.html">Оферти на живо</a></li>
    <li><a href="index.html#destinations">Дестинации</a></li>
    <li><a href="kruizi.html">Круизи</a></li>
    <li><a href="contact.html">Контакти</a></li>
  </ul>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html#offers">✈️ Оферти</a>
  <a href="oferti.html">🔥 Оферти на живо</a>
  <a href="index.html#destinations">🗺️ Дестинации</a>
  <a href="kruizi.html">🚢 Круизи</a>
  <a href="contact.html">📧 Контакти</a>
</div>

<div id="offerRoot">
<div class="offer-page" id="offerPage">
  <a href="oferti.html" class="offer-back">← Оферти на живо</a>

  <div class="modal-gallery-wrap">
    <img class="offer-hero-img" id="offerImg" src="" alt="">
    <button class="gallery-nav prev" id="galleryPrev" onclick="galleryStep(-1)" aria-label="Предишна">‹</button>
    <button class="gallery-nav next" id="galleryNext" onclick="galleryStep(1)" aria-label="Следваща">›</button>
    <div class="gallery-counter" id="galleryCounter"></div>
  </div>
  <div class="modal-thumbs" id="offerThumbs"></div>

  <div class="modal-badge-row" id="offerBadges" style="margin-top:1.2rem;"></div>
  <h1 class="modal-title" id="offerTitle" style="font-size:1.8rem;"></h1>
  <div class="modal-price-row">
    <div class="modal-price" id="offerPrice"></div>
    <div class="modal-price-sub" id="offerPriceSub"></div>
  </div>

  <div id="offerTabs" class="offer-tabs"></div>
  <div class="offer-tab-panels">
    <div class="otp offer-details" id="panelProgram" style="display:none;"></div>
    <div class="otp offer-details" id="panelHotels" style="display:none;"></div>
    <div class="otp offer-details" id="panelIncludes" style="display:none;"></div>
    <div class="otp offer-details" id="panelExcludes" style="display:none;"></div>
  </div>

  <div class="offer-section-title">📅 Налични дати</div>
  <div class="modal-dates-grid" id="offerDates"></div>

  <div class="inquiry-form" id="inquirySection" style="margin-top:2rem;">
    <h3>📬 Изпратете запитване</h3>
    <div id="inqSelected" style="display:none;background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:0.9rem;color:#08351c;"></div>
    <div id="inquiryFormContent">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Вашето име *</label><input type="text" class="form-input" id="inqName" placeholder="Иван Иванов"></div>
        <div class="form-group"><label class="form-label">Телефон *</label><input type="tel" class="form-input" id="inqPhone" placeholder="+359 88 888 8888"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="inqEmail" placeholder="ivan@example.com"></div>
        <div class="form-group"><label class="form-label">Реф. номер на оферта</label><input type="text" class="form-input" id="inqRef" readonly style="background:var(--gray-100);font-weight:600;"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Възрастни *</label>
          <select class="form-select" id="inqAdults"><option value="1">1 възрастен</option><option value="2">2 възрастни</option><option value="3">3 възрастни</option><option value="4">4 възрастни</option><option value="5">5 възрастни</option><option value="6">6+ възрастни</option></select>
        </div>
        <div class="form-group"><label class="form-label">Деца</label>
          <select class="form-select" id="inqChildren"><option value="0">Без деца</option><option value="1">1 дете</option><option value="2">2 деца</option><option value="3">3 деца</option><option value="4">4 деца</option></select>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:12px;"><label class="form-label">Предпочитана дата</label><select class="form-select" id="inqDate"></select></div>
      <div class="form-group" style="margin-bottom:12px;"><label class="form-label">Съобщение (по желание)</label><textarea class="form-textarea" id="inqMsg" placeholder="Специални изисквания, въпроси..."></textarea></div>
      <button class="form-submit" onclick="submitJivoInquiry()">✉️ Изпрати запитване</button>
    </div>
    <div class="form-success" id="inquirySuccess" style="display:none;">
      <div class="form-success-icon">🎉</div><h4>Запитването е изпратено!</h4>
      <p style="color:var(--gray-600);margin-top:6px;">Ще се свържем с вас възможно най-скоро.</p>
    </div>
  </div>
</div>
</div>

<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()" aria-label="Затвори">✕</button>
  <button class="lightbox-nav prev" onclick="lightboxStep(-1)" aria-label="Предишна">‹</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="">
  <button class="lightbox-nav next" onclick="lightboxStep(1)" aria-label="Следваща">›</button>
</div>
<div class="toast-container" id="toastContainer"></div>

<script src="data/peakview.js?v=2"></script>
<script src="oferta-jivo.js?v=6"></script>

</body>
</html>
